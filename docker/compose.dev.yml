# Dev overlay — expose ports + dev environment.
# Dùng với: docker compose -f docker/compose.yml -f docker/compose.dev.yml up
# Để build từ source, thêm: -f docker/compose.build.yml up --build

services:
  postgres:
    restart: unless-stopped
    ports: ["5432:5432"]
    healthcheck:
      interval: 5s
      start_period: 10s

  redis:
    restart: unless-stopped
    ports: ["6379:6379"]
    healthcheck:
      interval: 5s

  backend:
    restart: unless-stopped
    ports: ["8080:8080"]
    environment:
      ASPNETCORE_ENVIRONMENT: Development

  storage-worker:
    restart: unless-stopped

  alert-worker:
    restart: unless-stopped

  grafana:
    restart: unless-stopped
    ports: ["3000:3000"]
