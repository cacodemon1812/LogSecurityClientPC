# Production overlay — tất cả biến môi trường bắt buộc, không có default.
# Dùng với: docker compose -f docker/compose.yml -f docker/compose.prod.yml up -d
# Đặt các biến trong .env hoặc môi trường CI/CD (không commit .env vào git).

services:
  postgres:
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    healthcheck:
      interval: 10s
      start_period: 30s

  redis:
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --appendonly yes
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
    healthcheck:
      interval: 10s

  backend:
    image: ${DOCKER_REGISTRY:?DOCKER_REGISTRY is required}/policycollector-backend:${VERSION:?VERSION is required}
    restart: always
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Postgres: ${POSTGRES_CONNECTION_STRING:?POSTGRES_CONNECTION_STRING is required}
      ConnectionStrings__Redis: ${REDIS_CONNECTION_STRING:?REDIS_CONNECTION_STRING is required}
      Backend__ApiKey: ${BACKEND_API_KEY:?BACKEND_API_KEY is required}
      Backend__HmacSecret: ${HMAC_SECRET:?HMAC_SECRET is required}
      Backend__HmacRequired: "true"
      Backend__AlertWebhookUrl: ${ALERT_WEBHOOK_URL:-}
    healthcheck:
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  storage-worker:
    image: ${DOCKER_REGISTRY}/policycollector-worker:${VERSION}
    restart: always
    environment:
      ConnectionStrings__Postgres: ${POSTGRES_CONNECTION_STRING}
      ConnectionStrings__Redis: ${REDIS_CONNECTION_STRING}
      Backend__ApiKey: ${BACKEND_API_KEY}

  alert-worker:
    image: ${DOCKER_REGISTRY}/policycollector-worker:${VERSION}
    restart: always
    environment:
      ConnectionStrings__Postgres: ${POSTGRES_CONNECTION_STRING}
      ConnectionStrings__Redis: ${REDIS_CONNECTION_STRING}
      Backend__ApiKey: ${BACKEND_API_KEY}
      Backend__AlertWebhookUrl: ${ALERT_WEBHOOK_URL:-}

  grafana:
    image: grafana/grafana:10-ubuntu
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:?GRAFANA_USER is required}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?GRAFANA_PASSWORD is required}
