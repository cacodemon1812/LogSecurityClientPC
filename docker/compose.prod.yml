version: "3.9"

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    restart: always
    environment:
      POSTGRES_DB: policycollector
      POSTGRES_USER: pcollector
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pcollector -d policycollector"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
    ports: ["6379:6379"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ${DOCKER_REGISTRY}/policycollector-backend:${VERSION}
    restart: always
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__Postgres: ${POSTGRES_CONNECTION_STRING}
      ConnectionStrings__Redis: ${REDIS_CONNECTION_STRING}
      Backend__ApiKey: ${BACKEND_API_KEY}
      Backend__HmacSecret: ${HMAC_SECRET}
      Backend__HmacRequired: "true"
      Backend__SupportedSchemaVersion: "1"
      Backend__AlertWebhookUrl: ${ALERT_WEBHOOK_URL}
    ports: ["8080:8080"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  storage-worker:
    image: ${DOCKER_REGISTRY}/policycollector-backend:${VERSION}
    restart: always
    environment:
      WORKER_TYPE: storage
      ConnectionStrings__Postgres: ${POSTGRES_CONNECTION_STRING}
      ConnectionStrings__Redis: ${REDIS_CONNECTION_STRING}
    depends_on:
      backend: { condition: service_healthy }

  alert-worker:
    image: ${DOCKER_REGISTRY}/policycollector-backend:${VERSION}
    restart: always
    environment:
      WORKER_TYPE: alert
      ConnectionStrings__Postgres: ${POSTGRES_CONNECTION_STRING}
      ConnectionStrings__Redis: ${REDIS_CONNECTION_STRING}
      Backend__AlertWebhookUrl: ${ALERT_WEBHOOK_URL}
    depends_on:
      backend: { condition: service_healthy }

  grafana:
    image: grafana/grafana:10-ubuntu
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_INSTALL_PLUGINS: ""
    ports: ["3000:3000"]
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      postgres: { condition: service_healthy }

volumes:
  pgdata:
  redisdata:
  grafana_data:
