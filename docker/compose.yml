# Base compose — định nghĩa tất cả services với image sẵn, không có build.
# Luôn dùng cùng một overlay:
#   Dev (image sẵn) : docker compose -f docker/compose.yml -f docker/compose.dev.yml up
#   Dev (build local): docker compose -f docker/compose.yml -f docker/compose.dev.yml -f docker/compose.build.yml up --build
#   Production       : docker compose -f docker/compose.yml -f docker/compose.prod.yml up -d

name: policycollector

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: policycollector
      POSTGRES_USER: pcollector
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pcollector -d policycollector"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-devredis}
      --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-devredis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ${DOCKER_REGISTRY:-policycollector-local}/policycollector-backend:${VERSION:-dev}
    environment:
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=policycollector;Username=pcollector;Password=${POSTGRES_PASSWORD:-devpassword}"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD:-devredis},abortConnect=false"
      Backend__ApiKey: ${BACKEND_API_KEY:-dev-api-key-minimum-32-chars-here!!}
      Backend__HmacSecret: ${HMAC_SECRET:-}
      Backend__HmacRequired: ${BACKEND_HMAC_REQUIRED:-false}
      Backend__SupportedSchemaVersion: "1.0"
      Backend__AlertWebhookUrl: ${ALERT_WEBHOOK_URL:-}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 25s

  storage-worker:
    image: ${DOCKER_REGISTRY:-policycollector-local}/policycollector-worker:${VERSION:-dev}
    environment:
      WORKER_TYPE: storage
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=policycollector;Username=pcollector;Password=${POSTGRES_PASSWORD:-devpassword}"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD:-devredis},abortConnect=false"
      Backend__ApiKey: ${BACKEND_API_KEY:-dev-api-key-minimum-32-chars-here!!}
    depends_on:
      backend: { condition: service_healthy }

  alert-worker:
    image: ${DOCKER_REGISTRY:-policycollector-local}/policycollector-worker:${VERSION:-dev}
    environment:
      WORKER_TYPE: alert
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=policycollector;Username=pcollector;Password=${POSTGRES_PASSWORD:-devpassword}"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD:-devredis},abortConnect=false"
      Backend__ApiKey: ${BACKEND_API_KEY:-dev-api-key-minimum-32-chars-here!!}
      Backend__AlertWebhookUrl: ${ALERT_WEBHOOK_URL:-}
    depends_on:
      backend: { condition: service_healthy }

  dashboard:
    image: ${DOCKER_REGISTRY:-policycollector-local}/policycollector-dashboard:${VERSION:-dev}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8080}
    depends_on:
      backend: { condition: service_healthy }

volumes:
  pgdata:
  redisdata:
