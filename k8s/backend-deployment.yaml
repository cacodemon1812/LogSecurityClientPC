apiVersion: apps/v1
kind: Deployment
metadata:
  name: policycollector-backend
  namespace: policycollector
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: your-registry/policycollector-backend:1.0.0
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: ASPNETCORE_HTTP_PORTS
              value: "8080"
            - name: ConnectionStrings__Postgres
              valueFrom:
                secretKeyRef:
                  name: pc-secrets
                  key: postgres-connection-string
            - name: ConnectionStrings__Redis
              valueFrom:
                secretKeyRef:
                  name: pc-secrets
                  key: redis-connection-string
            - name: Backend__ApiKey
              valueFrom:
                secretKeyRef:
                  name: pc-secrets
                  key: api-key
            - name: Backend__HmacSecret
              valueFrom:
                secretKeyRef:
                  name: pc-secrets
                  key: hmac-secret
            - name: Backend__HmacRequired
              value: "true"
            - name: Backend__AlertWebhookUrl
              valueFrom:
                configMapKeyRef:
                  name: pc-config
                  key: alert-webhook-url
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
